<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="About Amana — transparent humanitarian aid." />
    <title>About us | Amana</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="site-header">
      <div class="header-inner">
        <a class="logo" href="/">
          <span class="logo-mark" aria-hidden="true"></span>
          Amana
        </a>
        <button
          class="nav-toggle"
          type="button"
          aria-label="Toggle menu"
          aria-controls="primary-menu"
          aria-expanded="false"
        >
          <span class="nav-toggle-bar"></span>
          <span class="nav-toggle-bar"></span>
          <span class="nav-toggle-bar"></span>
        </button>
        <div class="header-menu" id="primary-menu">
          <nav class="nav" aria-label="Primary">
            <ul>
              <li><a href="/#main">Home</a></li>
              <li><a href="/about" class="nav-link-active">About us</a></li>
              <li><a href="/giving">Giving</a></li>
              <li><a href="/partners">Our partners</a></li>
              <li><a href="/contact">Contact</a></li>
            </ul>
          </nav>
          <a class="btn btn-header" href="mailto:hello@amana.org">Get in touch</a>
        </div>
      </div>
    </header>

    <main id="main">
      <section class="hero hero--page" aria-labelledby="page-heading">
        <div class="hero-page-inner">
          <p class="hero-label">About</p>
          <h1 id="page-heading">About us</h1>
          <p class="hero-lead">
            This page is a placeholder. Add your story, team, and mission here
            when you are ready.
          </p>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p class="footer-brand">Amana</p>
        <p class="footer-copy">
          Transforming how humanitarian aid moves, for the people it is meant to serve.
        </p>
      </div>
    </footer>
    <script>
      (function () {
        var header = document.querySelector(".site-header");
        var toggle = header ? header.querySelector(".nav-toggle") : null;
        var menu = header ? header.querySelector(".header-menu") : null;

        function closeMenu() {
          if (!header || !toggle || !menu) return;
          header.classList.remove("menu-open");
          toggle.setAttribute("aria-expanded", "false");
        }

        if (header && toggle && menu) {
          toggle.addEventListener("click", function () {
            var opening = !header.classList.contains("menu-open");
            header.classList.toggle("menu-open", opening);
            toggle.setAttribute("aria-expanded", opening ? "true" : "false");
          });

          menu.querySelectorAll("a").forEach(function (a) {
            a.addEventListener("click", closeMenu);
          });

          document.addEventListener("click", function (event) {
            if (!header.classList.contains("menu-open")) return;
            if (!header.contains(event.target)) closeMenu();
          });

          document.addEventListener("keydown", function (event) {
            if (event.key === "Escape") closeMenu();
          });

          window.addEventListener("resize", function () {
            if (window.matchMedia("(min-width: 901px)").matches) closeMenu();
          });
        }
      })();
    </script>
  </body>
</html>
